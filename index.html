<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Final</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link href="css/bootstrap.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
</head>

<body class="bg-light text-dark">

    <div id="container">
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <a class="navbar-brand" href="#">Projeto Final</a>
            <button type="button" class="btn btn-outline-dark" id="color">🦄 Click Me</button>
            <button type="button" class="btn btn-outline-dark" id="resetBtn">🔄 Reset</button>
        </nav>
        <div id="mybackground">
            <h1 id="myName">Meu Portifólio</h1>
            <p id="myDescription">Sou estudante de Programação Low Code...</p>
            <img id="banner" src="images/imagePrincipal.jpg" alt="">
        </div>

        <br><br>
        <div>
            <h4>Meus favoritos 🥰</h4>
            <ul id="myList">
                <li>SQL</li>
                <li>Programação WEB</li>
                <li>Desenvolvimento de Software</li>

            </ul>
        </div>
        <br>
        <div class="container">
            <div class="row">
                <div class="col">
                    <button type="button" class="btn btn-outline-dark" id="modeBtn"> 🌃 / 🌅 Mode</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-dark" id="imgBtn">🖼️ Trocar Imagem</button>
                </div>
                <div class="col">
                    <button type="button" class="btn btn-outline-dark" id="hobbyBtn">🖥️ Adicionar Hobby</button>
                </div>
            </div>
        </div>
        
        <br><br>
        <form id="profileForm">
            <div class="form-group">
                <label for="exampleFormControlInput1">Nome:</label>
                <input type="text" class="form-control" id="exampleFormControlInput1" name="nome"
                    placeholder="Digite o seu nome">
            </div>
            <br>
            <div class="form-group">
                <label for="exampleFormControlTextarea1">Frase de Apresentação:</label>
                <textarea class="form-control" id="exampleFormControlTextarea1" name="frase" rows="3"></textarea>
            </div>
            <br>
            <div class="form-group">
                <label for="corFavorita">Cor Favorita:</label>
                <input type="color" name="cor" id="corFavorita">
            </div>
            <br>
            <div class="form-group">
                <label for="exampleFormControlFile1">Foto (URL)</label>
                <input type="text" class="form-control" id="exampleFormControlFile1" name="foto"
                    placeholder="exemplo.jpg">
            </div>
            <br>
            <button type="button" class="btn btn-outline-dark" id="SubmitBtn" type="submit">Atualizar Portfólio</button>
            <p id="counterDisplay">Perfil atualizado 0 vezes</p>
            <br><br>
        </form>
        <div>
            <h2 id="inspiration">Inspiração do dia</h2>
            <br>
        </div>

        <div class="card-group">
            <div class="row g-2">
                <div class="col">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">How about a cat? 😸</h5>
                            <button type="button" class="btn btn-outline-dark" id="catApiBtn">Carregar
                                inspiração</button><br><br>
                            <div id="catContainer"></div>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Or.. A dog? 🐶</h5>
                            <button type="button" class="btn btn-outline-dark" id="dogApiBtn">Carregar
                                inspiração</button><br><br>
                            <div id="dogContainer"></div>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Or maybe a random one?🍵</h5>
                            <button type="button" class="btn btn-outline-dark" id="birdApiBtn">Carregar
                                inspiração</button><br><br>
                            <div id="birdContainer"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>



    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</html>
